<!DOCTYPE html>
<html lang="{{ current_lang }}" data-lang="{{ current_lang }}">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    display: flex;
}

/* Left Panel */
.left-panel {
    flex: 1;
    background: linear-gradient(135deg, #1f2937, #111827);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px;
}

.left-panel h1 {
    font-size: 32px;
    margin-bottom: 15px;
}

.left-panel p {
    opacity: 0.8;
    text-align: center;
    max-width: 300px;
}

/* Right Panel */
.right-panel {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #f9fafb;
}

/* Login Card */
.login-card {
    width: 350px;
    background: white;
    padding: 35px;
    border-radius: 10px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

.login-card h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #111827;
    margin-top: 20px;
}

.input-group {
    margin-bottom: 18px;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #d1d5db;
    font-size: 14px;
    transition: 0.3s;
}

.input-group input:focus {
    border-color: #2563eb;
    outline: none;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background-color: #111827;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.3s;
}

button:hover {
    background-color: #2563eb;
}

.back {
    cursor: pointer;
    font-size: 14px;
    
}

.back:hover {
    transform:translateX(-10px);
    transition-duration: 0.5s;
}
.back a{
    text-decoration: none;
    color: rgb(10, 10, 10);
    font-size: larger;
    font-weight: bolder;
}
/* Responsive */
@media(max-width: 768px) {
    body {
        flex-direction: column;
    }
    .left-panel {
        display: none;
    }
}
</style>
</head>
<body>



<div class="left-panel">
    <h1 data-i18n="admin.portal.title">Admin Portal</h1>
    <p><span data-i18n="admin.portal.desc">Manage complaints, users, workers, and system activities from one central dashboard.</span></p>
</div>

<div class="right-panel">
<div id="lang-switcher" style="position:fixed;top:14px;right:18px;z-index:9999;"></div>
    
    <div class="login-card">
        <div class="back">
        <a href="/" data-i18n="auth.back.home">Back To Home</a></div>
        <h2 data-i18n="auth.login">Sign In</h2>
        <form method="POST">
            <div class="input-group">
                <input type="text" name="username" data-i18n="auth.username" placeholder="Admin Name" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" data-i18n="auth.password" placeholder="Password" required>
            </div>
            <button type="submit"data-i18n="auth.login">Login</button>
            
        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='js/lang.js') }}"></script>
</body>
</html>
