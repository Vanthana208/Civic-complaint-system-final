<!DOCTYPE html>
<html lang="{{ current_lang }}" data-lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Dashboard | Assigned Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --sidebar-bg: #0f172a;
            --main-bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #10b981;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--main-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            height: 100vh;
            color: white;
            position: fixed;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }

        .sidebar h2 {
            padding: 40px 30px;
            margin: 0;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            color: #fff;
            border-bottom: 1px solid #1e293b;
        }

        .nav-links {
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar a {
            color: #94a3b8;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .sidebar a:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
            transform: translateX(5px);
        }

        /* Highlighting the 'Assigned Work' link as active */
        .sidebar a.active {
            background-color: var(--primary);
            color: white;
        }

        .logout-btn {
            margin-top: auto;
            padding: 30px 15px;
        }

        .logout-btn a {
            color: #f87171;
            background: rgba(239, 68, 68, 0.1);
        }

        /* --- MAIN CONTENT --- */
        .main {
            margin-left: 280px;
            padding: 50px;
            width: 100%;
            max-width: 1200px;
        }

        header {
            margin-bottom: 30px;
        }

        header h2 { 
            font-size: 1.8rem; 
            margin: 0; 
            font-weight: 700; 
            color: var(--text-main);
        }

        /* --- TABLE CARD --- */
        .table-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #f8fafc;
            padding: 20px;
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid #e2e8f0;
        }

        td {
            padding: 20px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.95rem;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover { background-color: #fcfcfd; }

        /* Badges */
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            background: #f1f5f9;
            color: var(--text-muted);
        }

        .verify-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            background: #ecfdf5;
            color: #065f46;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 data-i18n="worker.panel">Worker Panel</h2>
    <div class="nav-links">
        <a href="{{ url_for('worker_dash') }}"data-i18n="nav.dashboard">Dashboard</a>
        <a href="{{ url_for('worker_dashboard') }}" data-i18n="worker.assigned">Assigned Work</a>
        <a href="{{ url_for('worker_assigned_tasks') }}" class="active"data-i18n="worker.completed">Completed Work</a>
    </div>
    <div id="lang-switcher" style="padding:8px 0 0;text-align:center;"></div>
    <div class="logout-btn">
        <a href="{{ url_for('logout') }}"data-i18n="admin.logout">Logout</a>
    </div>
</div>

<div class="main">
    <header>
        <h2>Assigned Tasks</h2>
    </header>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th data-i18n="admin.col.title">Issue Title</th>
                    <th data-i18n="admin.col.user">User Name</th>
                    <th data-i18n="admin.col.status">Status</th>
                    <th data-i18n="dept.col.verify">Verification Status</th>
                </tr>
            </thead>
            <tbody>
                {% for task in tasks %}
                <tr>
                    <td style="font-weight: 700; color: var(--text-muted);">#{{ task[0] }}</td>
                    <td style="font-weight: 600;">{{ task[1] }}</td>
                    <td>{{ task[2] }}</td>
                    <td><span class="status-badge">{{ task[3] }}</span></td>
                    <td><span class="verify-badge">{{ task[4] }}</span></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script src="{{ url_for('static', filename='js/lang.js') }}"></script>
</body>
</html>
