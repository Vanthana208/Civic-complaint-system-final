<!DOCTYPE html>
<html lang="{{ current_lang }}" data-lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ComplaintHub{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
    {% block extra_css %}{% endblock %}
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .auth-wrapper::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            top: -200px;
            left: -100px;
            border-radius: 50%;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            z-index: 1;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
            color: #4f46e5;
        }

        .auth-logo i {
            width: 48px;
            height: 48px;
            background: #eef2ff;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
        }

        .auth-subtitle {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .flash {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .flash.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
        .flash.danger { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .flash.warning { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }

        .lang-fixed {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="lang-fixed">
        <div id="lang-switcher"></div>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card glass-card">
            <div class="auth-logo">
                <i data-lucide="shield-check"></i>
                <div style="font-size: 1.2rem; font-weight: 800; color: #1e293b;">ComplaintHub</div>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">
                            <i data-lucide="{{ 'check-circle' if category == 'success' else 'alert-circle' }}"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </div>
    </div>

    <script>
        lucide.createIcons();

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = event.currentTarget.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    </script>
    <script src="{{ url_for('static', filename='js/lang.js') }}"></script>
</body>
</html>
