<!DOCTYPE html>
<html lang="{{ current_lang }}" data-lang="{{ current_lang }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Complaint</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/user.css') }}">
<style>
.verify-card {
    max-width: 600px; margin: 40px auto; background: white;
    border-radius: 20px; padding: 36px;
    border: 1px solid #e2e8f0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}
.verify-card h2 { font-size: 1.5rem; font-weight: 700; color: #0f172a; margin-bottom: 24px; }
.info-row { margin-bottom: 16px; }
.info-row strong { color: #475569; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
.info-row span { color: #1e293b; font-size: 0.95rem; }
.resolved-img { width: 100%; border-radius: 12px; margin: 16px 0; border: 1px solid #e2e8f0; }
.verify-btn {
    width: 100%; padding: 14px; background: #10b981; color: white;
    border: none; border-radius: 10px; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: 0.2s; margin-top: 10px;
}
.verify-btn:hover { background: #059669; transform: translateY(-1px); }
.no-image { color: #94a3b8; font-style: italic; }
</style>
</head>
<body>
<div style="padding: 40px;">
<div class="verify-card">
    <h2 data-i18n="verify.title">Verify Complaint</h2>
    <div class="info-row">
        <strong data-i18n="admin.col.title">Title</strong>
        <span>{{ complaint[2] }}</span>
    </div>
    <div class="info-row">
        <strong data-i18n="complaint.label.desc">Description</strong>
        <span>{{ complaint[3] }}</span>
    </div>
    <div class="info-row">
        <strong data-i18n="complaint.label.location">Location</strong>
        <span>{{ complaint[4] }}</span>
    </div>
    <div class="info-row">
        <strong data-i18n="admin.col.image">Resolved Image</strong>
        {% if complaint[7] %}
        <img src="{{ url_for('static', filename='uploads/' ~ complaint[7]) }}" class="resolved-img">
        {% else %}
        <p class="no-image" data-i18n="verify.no.image">No image uploaded yet.</p>
        {% endif %}
    </div>
    <form method="POST">
        <button type="submit" class="verify-btn" data-i18n="verify.btn">Mark as Verified / Resolved</button>
    </form>
</div>
</div>
<script src="{{ url_for('static', filename='js/lang.js') }}"></script>
</body>
</html>
