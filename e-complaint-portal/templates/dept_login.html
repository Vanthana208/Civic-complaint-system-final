<!DOCTYPE html>
<html lang="{{ current_lang }}" data-lang="{{ current_lang }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Department Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  background: #f1f5f9;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  background: white;
  width: 100%;
  max-width: 400px;
  border-radius: 16px;
  padding: 40px 36px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}

/* Top icon */
.icon-wrap {
  width: 52px; height: 52px;
  background: #e6fffa;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem;
  margin: 0 auto 20px;
}

h2 {
  text-align: center;
  font-size: 1.3rem;
  font-weight: 700;
  color: #0f172a;
  margin-bottom: 6px;
}

.sub {
  text-align: center;
  font-size: 0.85rem;
  color: #94a3b8;
  margin-bottom: 28px;
}

/* Flash */
.flash {
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 16px;
  font-size: 0.85rem;
}
.flash.danger  { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
.flash.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }

/* Fields */
.field { margin-bottom: 16px; }

.field label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: #374151;
  margin-bottom: 6px;
}

.field input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid #e2e8f0;
  border-radius: 8px;
  font-size: 0.92rem;
  font-family: inherit;
  background: #f8fafc;
  color: #0f172a;
  outline: none;
  transition: 0.2s;
}

.field input:focus {
  border-color: #0d9488;
  background: white;
  box-shadow: 0 0 0 3px rgba(13,148,136,0.1);
}

.field input::placeholder { color: #cbd5e1; }

/* Button */
.btn {
  width: 100%;
  padding: 12px;
  background: #0d9488;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  margin-top: 4px;
  transition: background 0.2s;
}

.btn:hover { background: #0f766e; }

/* Footer */
.footer {
  margin-top: 20px;
  text-align: center;
}

.footer a {
  font-size: 0.83rem;
  color: #94a3b8;
  text-decoration: none;
  transition: color 0.2s;
}

.footer a:hover { color: #0d9488; }

/* Lang switcher fixed */
#lang-switcher {
  position: fixed;
  top: 16px; right: 16px;
  z-index: 999;
}
</style>
</head>
<body>

<div id="lang-switcher"></div>

<div class="card">

  <div class="icon-wrap">🏛️</div>
  <h2 data-i18n="dept.login.title">Department Sign In</h2>
  <p class="sub">Enter your department credentials</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">

    <div class="field">
      <label data-i18n="auth.email">Email</label>
      <input type="email" name="email"
             placeholder="water@gov.in"
             data-i18n="dept.email.placeholder"
             required>
    </div>

    <div class="field">
      <label data-i18n="auth.password">Password</label>
      <input type="password" name="password"
             placeholder="••••••••"
             required>
    </div>

    <button type="submit" class="btn" data-i18n="nav.signin">Sign In</button>

  </form>

  <div class="footer">
    <a href="{{ url_for('home') }}" data-i18n="auth.back.home">← Back to Home</a>
  </div>

</div>

<script src="{{ url_for('static', filename='js/lang.js') }}"></script>
</body>
</html>
