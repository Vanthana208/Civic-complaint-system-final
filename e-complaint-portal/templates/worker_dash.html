<!DOCTYPE html>
<html lang="{{ current_lang }}" data-lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Dashboard | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --sidebar-bg: #0f172a;
            --main-bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--main-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            height: 100vh;
            color: white;
            position: fixed;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }

        .sidebar h2 {
            padding: 40px 30px;
            margin: 0;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            color: #fff;
            border-bottom: 1px solid #1e293b;
        }

        .nav-links {
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 12px; /* Spacious gaps between links */
        }

        .sidebar a {
            color: #94a3b8;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .sidebar a:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
            transform: translateX(5px);
        }

        /* Set Dashboard as active by default here */
        .sidebar a.active {
            background-color: var(--primary);
            color: white;
        }

        .logout-btn {
            margin-top: auto;
            padding: 30px 15px;
        }

        .logout-btn a {
            color: #f87171;
            background: rgba(239, 68, 68, 0.1);
        }

        .logout-btn a:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ff7e7e;
        }

        /* --- MAIN CONTENT --- */
        .main {
            margin-left: 280px;
            padding: 50px;
            width: 100%;
            max-width: 1200px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .welcome-card {
            background: var(--card-bg);
            padding: 60px;
            border-radius: 24px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            text-align: center;
            margin-top: 20px;
        }

        .welcome-card h2 {
            font-size: 2.5rem;
            margin: 0;
            font-weight: 800;
            background: linear-gradient(45deg, var(--primary), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-card p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-top: 15px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .quick-link {
            padding: 20px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            transition: all 0.2s;
        }

        .quick-link:hover {
            border-color: var(--primary);
            background: #fff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 data-i18n="worker.panel">Worker Panel</h2>
    <div class="nav-links">
        <a href="{{ url_for('worker_dash') }}" class="active"data-i18n="nav.dashboard">Dashboard</a>
        <a href="{{ url_for('worker_dashboard') }}"data-i18n="worker.assigned">Assigned Work</a>
        <a href="{{ url_for('worker_assigned_tasks') }}"data-i18n="worker.completed">Completed Work</a>
    </div>
    <div id="lang-switcher" style="padding:8px 0 0;text-align:center;"></div>
    <div class="logout-btn">
        <a href="{{ url_for('logout') }}"data-i18n="admin.logout">Logout</a>
    </div>
</div>

<div class="main">
    <div class="welcome-card">
        <h2>Welcome, {{ worker_name }}!</h2>
        <p><span data-i18n="worker.welcome.desc">You are successfully logged into the Worker Management Portal. Use the sidebar to manage your tasks or view your progress.</span></p>
        
        <div class="action-grid">
            <a href="{{ url_for('worker_dashboard') }}" class="quick-link">
                View Assigned Work →
            </a>
            <a href="{{ url_for('worker_assigned_tasks') }}" class="quick-link">
                View History →
            </a>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/lang.js') }}"></script>
</body>
</html>
