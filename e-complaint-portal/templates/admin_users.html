<!DOCTYPE html>
<html lang="{{ current_lang }}" data-lang="{{ current_lang }}">
<head>
    <title>Admin Users</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_panel.css') }}">
    <style>
        .points-badge {
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.82rem;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 data-i18n="admin.panel">Admin Panel</h2>
    <a href="{{url_for('admin_dashboard')}}"data-i18n="admin.dashboard">Dashboard</a>
    <a href="{{url_for('admin_complaints')}}"data-i18n="admin.complaints">Complaints</a>
    <a href="{{url_for('admin_users')}}" class="active"data-i18n="admin.users">Users</a>
    <a href="{{url_for('admin_add_workers')}}"data-i18n="admin.workers">Add Workers</a>
    <a href="{{url_for('admin_departments')}}"data-i18n="admin.departments">Departments</a>
    <a href="{{url_for('admin_leaderboard')}}"data-i18n="admin.leaderboard">Leaderboard</a>
    <div id="lang-switcher" style="padding:8px 0 0;text-align:center;"></div>
    <div class="logout-btn">
        <a href="{{ url_for('admin_logout') }}"data-i18n="admin.logout">Logout</a>
    </div>
</div>

<div class="main">
    <h2 class="page-title" data-i18n="admin.users">All Users</h2>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Points</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user[0] }}</td>
                    <td>{{ user[1] }}</td>
                    <td>{{ user[2] }}</td>
                    <td><span class="points-badge">{{ user[3] }} pts</span></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script src="{{ url_for('static', filename='js/lang.js') }}"></script>
</body>
</html>
