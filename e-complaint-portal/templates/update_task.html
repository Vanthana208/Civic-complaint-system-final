<!DOCTYPE html>
<html lang="{{ current_lang }}" data-lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Dashboard | Update Task</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --sidebar-bg: #0f172a;
            --main-bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--main-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            height: 100vh;
            color: white;
            position: fixed;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }

        .sidebar h2 {
            padding: 40px 30px;
            margin: 0;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            color: #fff;
            border-bottom: 1px solid #1e293b;
        }

        .nav-links {
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar a {
            color: #94a3b8;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .sidebar a:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .logout-btn {
            margin-top: auto;
            padding: 30px 15px;
        }

        .logout-btn a {
            color: #f87171;
            background: rgba(239, 68, 68, 0.1);
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 12px;
            display: block;
            font-weight: 600;
        }

        /* --- MAIN CONTENT --- */
        .main {
            margin-left: 280px;
            padding: 50px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centers the form card */
            justify-content: center;
            min-height: 100vh;
        }

        .form-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .form-card h2 {
            margin-top: 0;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
        }

        .form-card p {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Styled File Input */
        .file-upload-wrapper {
            border: 2px dashed var(--border);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            transition: border-color 0.3s;
            background: #fafafa;
        }

        .file-upload-wrapper:hover {
            border-color: var(--primary);
        }

        input[type="file"] {
            font-family: inherit;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Modern Button */
        .btn-submit {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 25px;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 data-i18n="worker.panel">Worker Panel</h2>
    <div class="nav-links">
        <a href="{{ url_for('worker_dash') }}"data-i18n="nav.dashboard">Dashboard</a>
        <a href="{{ url_for('worker_dashboard') }}" class="active"data-i18n="worker.assigned">Assigned Work</a>
        <a href="{{ url_for('worker_assigned_tasks') }}"data-i18n="worker.completed">Completed Work</a>
    </div>
    <div id="lang-switcher" style="padding:8px 0 0;text-align:center;"></div>
    <div class="logout-btn">
        <a href="{{ url_for('logout') }}"data-i18n="admin.logout">Logout</a>
    </div>
</div>

<div class="main">
    <div class="form-card">
        <h2 data-i18n="worker.update.title">Update Complaint</h2>
        <p><span data-i18n="worker.update.desc">Please upload a clear image of the completed work to resolve this task.</span></p>
        
        <form method="POST" enctype="multipart/form-data">
            <div class="file-upload-wrapper">
                <label style="font-weight: 600; display: block; margin-bottom: 10px;"data-i18n="worker.resolved.image">Resolved Image</label>
                <input type="file" name="resolved_image" accept="image/*" required>
            </div>
            
            <button type="submit" class="btn-submit"data-i18n="worker.mark.resolved">Mark as Resolved</button>
        </form>

        <a href="{{ url_for('worker_dashboard') }}" class="back-link"><span data-i18n="worker.back.tasks">← Back to Tasks</span></a>
    </div>
</div>

<script src="{{ url_for('static', filename='js/lang.js') }}"></script>
</body>
</html>
