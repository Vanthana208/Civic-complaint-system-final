{% extends "auth_base.html" %}

{% block title %}Forgot Password | ComplaintHub{% endblock %}
{% block heading %}Forgot Password{% endblock %}
{% block subheading %}Enter your registered email to reset your access.{% endblock %}

{% block content %}
<form method="POST">
    <div class="form-group" style="margin-bottom: 20px;">
        <label>Account Type</label>
        <select name="role" class="input-control" style="width: 100%;" required>
            <option value="user">Citizen / User</option>
            <option value="worker">Field Worker</option>
            <option value="department">Department Official</option>
        </select>
    </div>

    <div class="form-group" style="margin-bottom: 24px;">
        <label>Registered Email</label>
        <input type="email" name="email" class="input-control" style="width: 100%;" 
               placeholder="name@example.com" required>
    </div>

    <button type="submit" class="btn-auth">
        Verify Email
    </button>
</form>

<div style="text-align: center; margin-top: 32px;">
    <a href="{{ url_for('login') }}" style="color: #64748b; text-decoration: none; font-size: 0.85rem; font-weight: 600;">
        ← Back to Login
    </a>
</div>
{% endblock %}
