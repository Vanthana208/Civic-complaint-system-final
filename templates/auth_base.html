<!DOCTYPE html>
<html lang="{{ current_lang }}" data-lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ComplaintHub{% endblock %}</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://fastly.jsdelivr.net/npm/sweetalert2@11"></script>
    {% block extra_css %}{% endblock %}
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --light-bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.85);
            --border: rgba(226, 232, 240, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a;
            color: #1e293b;
            min-height: 100vh;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: 
                radial-gradient(circle at 0% 0%, rgba(79, 70, 229, 0.15), transparent 30%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.1), transparent 30%),
                #0f172a;
            position: relative;
        }

        /* Ambient Blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
        }
        .blob-1 { width: 400px; height: 400px; background: var(--primary); top: -100px; left: -100px; }
        .blob-2 { width: 300px; height: 300px; background: #8b5cf6; bottom: -50px; right: -50px; }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 48px;
            position: relative;
            z-index: 1;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            transition: padding 0.3s ease;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 24px;
                border-radius: 24px;
            }
            .auth-header h2 { font-size: 1.5rem; }
            .lang-fixed { top: 15px; right: 15px; }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-icon {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .auth-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .auth-header p {
            font-size: 0.95rem;
            color: #64748b;
        }

        /* Language Switcher Fix */
        .lang-fixed {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 100;
        }

        .flash {
            padding: 14px 18px;
            border-radius: 16px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .flash.success { background: #f0fdf4; color: #166534; border: 1px solid #dcfce7; }
        .flash.danger { background: #fef2f2; color: #991b1b; border: 1px solid #fee2e2; }

        input.input-control, select.input-control {
            background: white;
            border: 1px solid #e2e8f0;
            height: 52px;
            border-radius: 14px;
            padding: 0 16px;
            font-size: 1rem;
            font-family: inherit;
            transition: 0.2s;
        }

        input.input-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            outline: none;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 8px;
        }

        .btn-auth {
            width: 100%;
            height: 52px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 24px;
        }

        .btn-auth:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
        }
    </style>
</head>
<body>
    <div class="lang-fixed">
        <div id="lang-switcher"></div>
    </div>

    <div class="auth-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>

        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon">
                    <i data-lucide="shield-check" size="32"></i>
                </div>
                <h2 id="card-title">{% block heading %}Welcome Back{% endblock %}</h2>
                <p id="card-subtitle">{% block subheading %}Please sign in to continue.{% endblock %}</p>
            </div>

            <script>
                const Toast = Swal.mixin({
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 4000,
                    timerProgressBar: true
                });

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            Toast.fire({
                                icon: '{{ "success" if category == "success" else "error" if category == "danger" else "warning" if category == "warning" else "info" }}',
                                title: '{{ message }}'
                            });
                        {% endfor %}
                    {% endif %}
                {% endwith %}
            </script>

            {% block content %}{% endblock %}
        </div>
    </div>

    <script>
        lucide.createIcons();

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const trigger = event.currentTarget;
            if (input.type === 'password') {
                input.type = 'text';
                trigger.innerHTML = '<i data-lucide="eye-off"></i>';
            } else {
                input.type = 'password';
                trigger.innerHTML = '<i data-lucide="eye"></i>';
            }
            lucide.createIcons();
        }
    </script>
    <script src="{{ url_for('static', filename='js/lang.js') }}"></script>
</body>
</html>
